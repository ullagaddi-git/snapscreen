<!DOCTYPE html>
<html>
  <head><meta charset="UTF-8"><title>SnapScreen Audio Capture</title></head>
  <body>
    <div id="status">idle</div>
    <script>
      let mediaRecorder = null;
      let audioStream = null;
      let chunks = [];

      async function startCapture(sourceId) {
        try {
          // Capture system audio loopback via desktopCapturer source
          const stream = await navigator.mediaDevices.getUserMedia({
            audio: {
              mandatory: {
                chromeMediaSource: 'desktop',
                chromeMediaSourceId: sourceId,
              },
            },
            video: {
              mandatory: {
                chromeMediaSource: 'desktop',
                chromeMediaSourceId: sourceId,
                maxWidth: 16,
                maxHeight: 16,
                maxFrameRate: 1,
              },
            },
          });

          // Stop video tracks (we only want audio)
          stream.getVideoTracks().forEach(t => t.stop());

          // Build audio-only stream
          const audioTracks = stream.getAudioTracks();
          if (audioTracks.length === 0) {
            throw new Error('No system audio track available');
          }
          audioStream = new MediaStream(audioTracks);

          chunks = [];
          mediaRecorder = new MediaRecorder(audioStream, {
            mimeType: 'audio/webm;codecs=opus',
            audioBitsPerSecond: 128000,
          });

          mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) {
              e.data.arrayBuffer().then(buf => {
                window.snapscreenAudio.appendChunk(new Uint8Array(buf));
              });
            }
          };

          mediaRecorder.onstop = async () => {
            await window.snapscreenAudio.captureFinished();
          };

          mediaRecorder.onerror = (e) => {
            window.snapscreenAudio.captureError(String(e.error || e));
          };

          mediaRecorder.start(1000); // 1-second chunks
          document.getElementById('status').textContent = 'recording';
          return { success: true };
        } catch (err) {
          document.getElementById('status').textContent = 'error: ' + err.message;
          return { success: false, error: err.message };
        }
      }

      function stopCapture() {
        if (mediaRecorder && mediaRecorder.state !== 'inactive') {
          mediaRecorder.stop();
        }
        if (audioStream) {
          audioStream.getTracks().forEach(t => t.stop());
          audioStream = null;
        }
        document.getElementById('status').textContent = 'stopped';
        return { success: true };
      }

      // Expose for main-process IPC trigger
      window.__startCapture = startCapture;
      window.__stopCapture = stopCapture;
    </script>
  </body>
</html>
